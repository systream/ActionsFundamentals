name: GitHub Actions Demo

on:
  push:
    branches: [ "main" ]
    paths-ignore: ['.github/**']

  pull_request:
    branches: [ "main" ]

  schedule:
    - cron: '15 6 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ${{github.event_name}}
        run: echo "${{github.event_name}}"

      - name: Current branch
        run: |
          echo Current branch:
          echo ${{ github.ref}}
      - name: List files
        run: ls