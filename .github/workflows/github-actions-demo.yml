name: Deploy GitHub Actions Demo

on:
  push:
    branches: [ "main" ]
    paths-ignore: ['.github/**']

  pull_request:
    branches: [ "main" ]

  schedule:
    - cron: '15 6 * * 0'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        type: environment
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Name of the event that triggered the workflow
        run: echo "${{github.event_name}}"

      - name: Name of the branch that the repository is currently referencing
        run: |
          echo Current branch:
          echo ${{ github.ref}}
      - name: List of all files in the repository
        run: tree
  Test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: Build
    environment: Test
    steps:
      - run: echo "🧪 Testing..."

  Load-Test:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [Build, Pre-Production]
    environment: Load-Test
    steps:
      - run: |
          echo "🧪 Testing..."
          sleep 15

  Pre-Production:
    runs-on: ubuntu-latest
    needs: [ Test ]
    environment:
      name: Pre-Production
      url: https://beta.writeabout.net
    if: github.event.inputs.environment == 'Production'
    steps:
      - run: |
          echo "🚀 Step 1..."
          sleep 10
      - run: |
          echo "🚀 Step 2..."
          sleep 10

  Production:
    runs-on: ubuntu-latest
    needs: [ Pre-Production, Test, Load-Test ]
    environment:
      name: Production
      url: https://writeabout.net
    if: github.event.inputs.environment == 'Production'
    steps:
      - run: |
          echo "🚀 Step 1..."
          sleep 10
      - run: |
          echo "🚀 Step 2..."
          sleep 10
      - run: |
          echo "🚀 Step 3..."
          sleep 10
      - run: |
          echo "🚀 Step 4..."
          sleep 10
      - run: |
          echo "🚀 Step 5..."
          sleep 10